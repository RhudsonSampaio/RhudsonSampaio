<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0b0f14" />
            <stop offset="100%" stop-color="#0d1117" />
        </linearGradient>
        <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c9a24a" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#c9a24a" stop-opacity="0.0" />
        </linearGradient>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
            <circle cx="40" cy="40" r="1" fill="#161b22" />
        </pattern>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="1200" height="320" fill="url(#bgGrad)" />
    <rect width="1200" height="320" fill="url(#grid)" />
    
    <!-- Data Fill Area -->
    <path d="M 0 290 
             L 100 295 L 180 260 L 260 275 L 340 210 L 420 230 L 500 170 
             L 580 195 L 660 140 L 740 160 L 820 110 L 900 130 L 980 80 
             L 1060 95 L 1140 60 L 1200 70 
             L 1200 320 L 0 320 Z" 
          fill="url(#fillGrad)" />
          
    <!-- Main Irregular Line -->
    <path d="M 0 290 
             L 100 295 L 180 260 L 260 275 L 340 210 L 420 230 L 500 170 
             L 580 195 L 660 140 L 740 160 L 820 110 L 900 130 L 980 80 
             L 1060 95 L 1140 60 L 1200 70" 
          fill="none" stroke="#8a6f2f" stroke-width="1.5" />
          
    <!-- Smooth Trend Line -->
    <path d="M 0 280 
             Q 200 290, 350 220
             T 650 160
             T 950 110
             T 1200 65"
          fill="none" stroke="#c9a24a" stroke-width="2.5" filter="url(#glow)" />

    <!-- Trend Line Points -->
    <circle cx="350" cy="220" r="3.5" fill="#e6edf3" />
    <circle cx="650" cy="160" r="3.5" fill="#e6edf3" />
    <circle cx="950" cy="110" r="3.5" fill="#e6edf3" />

    <!-- Text Area -->
    <text x="80" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="normal" fill="#e6edf3" letter-spacing="1">Rhudson Sampaio</text>
    <text x="83" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="normal" fill="#9da7b3" letter-spacing="0.5">Analista de Dados e Business Intelligence</text>
</svg>
