<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0b0f14" />
            <stop offset="100%" stop-color="#0d1117" />
        </linearGradient>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
            <circle cx="40" cy="40" r="1" fill="#161b22" />
        </pattern>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="1200" height="320" fill="url(#bgGrad)" />
    <rect width="1200" height="320" fill="url(#grid)" />
    
    <!-- Latent Manifold (Ribbons for AlphaFold/GNN feel) -->
    <path d="M 400 120 
             C 550 80, 600 220, 720 100 
             S 950 250, 1050 150" 
          fill="none" stroke="#8a6f2f" stroke-width="30" opacity="0.1" stroke-linecap="round"/>

    <path d="M 450 280 
             C 600 320, 700 120, 800 200 
             S 1000 100, 1100 80" 
          fill="none" stroke="#c9a24a" stroke-width="40" opacity="0.05" stroke-linecap="round"/>

    <!-- Dim Background Connections (Graphite) -->
    <g stroke="#161b22" stroke-width="1.5">
        <line x1="500" y1="200" x2="580" y2="140" />
        <line x1="500" y1="200" x2="650" y2="240" />
        <line x1="500" y1="200" x2="450" y2="280" />
        <line x1="500" y1="200" x2="400" y2="120" />
        <line x1="580" y1="140" x2="650" y2="240" />
        <line x1="580" y1="140" x2="720" y2="100" />
        <line x1="580" y1="140" x2="620" y2="60" />
        <line x1="650" y1="240" x2="800" y2="200" />
        <line x1="650" y1="240" x2="780" y2="280" />
        <line x1="720" y1="100" x2="800" y2="200" />
        <line x1="720" y1="100" x2="880" y2="120" />
        <line x1="720" y1="100" x2="620" y2="60" />
        <line x1="800" y1="200" x2="880" y2="120" />
        <line x1="800" y1="200" x2="950" y2="260" />
        <line x1="800" y1="200" x2="780" y2="280" />
        <line x1="880" y1="120" x2="950" y2="260" />
        <line x1="880" y1="120" x2="1050" y2="150" />
        <line x1="880" y1="120" x2="920" y2="60" />
        <line x1="950" y1="260" x2="1050" y2="150" />
        <line x1="950" y1="260" x2="1020" y2="280" />
        <line x1="1050" y1="150" x2="1100" y2="80" />
        <line x1="1050" y1="150" x2="1150" y2="220" />
        <line x1="1050" y1="150" x2="920" y2="60" />
        <line x1="1050" y1="150" x2="1020" y2="280" />
        <line x1="1100" y1="80" x2="1150" y2="220" />
    </g>

    <!-- Glowing Gold Edges (Data flowing / active network) -->
    <g fill="none" stroke-linecap="round" filter="url(#glow)">
        <path d="M 400 120 L 580 140 L 720 100 L 880 120 L 1050 150 L 1100 80" stroke="#c9a24a" stroke-width="2.5" />
        <path d="M 450 280 L 650 240 L 800 200 L 880 120" stroke="#8a6f2f" stroke-width="2" />
        <path d="M 580 140 L 650 240" stroke="#8a6f2f" stroke-width="1.5" />
        <path d="M 720 100 L 800 200" stroke="#c9a24a" stroke-width="1.5" />
        <path d="M 1050 150 L 1150 220" stroke="#8a6f2f" stroke-width="1.5" />
    </g>

    <!-- Base Nodes -->
    <g fill="#161b22">
        <circle cx="500" cy="200" r="4" />
        <circle cx="650" cy="240" r="5" fill="#8a6f2f" opacity="0.5"/>
        <circle cx="950" cy="260" r="4" />
        <circle cx="1150" cy="220" r="4.5" fill="#8a6f2f" opacity="0.6"/>
        <circle cx="620" cy="60" r="3" />
        <circle cx="780" cy="280" r="3.5" />
        <circle cx="920" cy="60" r="4" />
        <circle cx="1020" cy="280" r="3" />
    </g>

    <!-- Floating data points (Clustering effect) -->
    <g fill="#c9a24a" opacity="0.6">
        <circle cx="850" cy="110" r="1.5" />
        <circle cx="890" cy="100" r="2" />
        <circle cx="870" cy="140" r="1.5" />
        <circle cx="900" cy="130" r="2.5" />
        <circle cx="700" cy="90" r="2" />
        <circle cx="730" cy="85" r="1.5" />
        <circle cx="710" cy="120" r="1.5" />
        <circle cx="1030" cy="140" r="2" />
        <circle cx="1060" cy="165" r="1.5" />
    </g>

    <!-- Active Nodes (Gold) -->
    <g fill="#0b0f14" stroke="#c9a24a" stroke-width="2" filter="url(#glow)">
        <circle cx="400" cy="120" r="5" />
        <circle cx="580" cy="140" r="6" />
        <circle cx="720" cy="100" r="7" />
        <circle cx="880" cy="120" r="8" />
        <circle cx="1050" cy="150" r="6" />
        <circle cx="1100" cy="80" r="5" />
        <circle cx="450" cy="280" r="4" stroke="#8a6f2f" />
        <circle cx="800" cy="200" r="6" stroke="#8a6f2f" />
    </g>

    <!-- Node inner dots (Data point) -->
    <g fill="#e6edf3">
        <circle cx="400" cy="120" r="2" />
        <circle cx="580" cy="140" r="2" />
        <circle cx="720" cy="100" r="2.5" />
        <circle cx="880" cy="120" r="3" />
        <circle cx="1050" cy="150" r="2" />
        <circle cx="1100" cy="80" r="1.5" />
        <circle cx="800" cy="200" r="2" />
    </g>

    <!-- Text Area -->
    <text x="80" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="normal" fill="#e6edf3" letter-spacing="1">Rhudson Sampaio</text>
    <text x="83" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="normal" fill="#9da7b3" letter-spacing="0.5">Analista de Dados e Business Intelligence</text>
</svg>
